name: ShellCheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          scandir: '.'
          severity: style        # error → warning → info → style (most thorough)
          check_together: yes    # analyse all scripts together; catches cross-file issues

      - name: Install shfmt
        run: |
          curl -sSfL https://github.com/mvdan/sh/releases/latest/download/shfmt_$(curl -s https://api.github.com/repos/mvdan/sh/releases/latest | grep tag_name | cut -d'"' -f4)_linux_amd64 \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Check shell script formatting (shfmt)
        run: shfmt -d -i 2 -ci .
        # -d   : diff mode — fails if any file would change
        # -i 2 : 2-space indent
        # -ci  : indent switch cases
